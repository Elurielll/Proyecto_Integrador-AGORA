<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agora OS - Panel de Comando</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Indicador Online con Bolita Palpitante */
        .online-badge { 
            background: #0ea5e9; 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: bold; 
            display: flex; 
            align-items: center;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); 
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 0 rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: var(--bg); }
        .tab-btn:hover:not(.active) { background: #334155; color: white; }

        .tab-content { display: none; background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #334155; min-height: 400px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        /* Estilos de Log */
        .log-row { padding: 12px; border-bottom: 1px solid #334155; font-size: 13px; display: flex; gap: 15px; align-items: center; }
        .log-row:hover { background: #1e293b; }
        .log-time { color: #64748b; min-width: 90px; font-family: monospace; }
        .log-user { color: var(--accent); font-weight: bold; min-width: 150px; }
        .log-desc { flex-grow: 1; }
        .log-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: #334155; color: #cbd5e1; text-transform: uppercase; }

        /* Estilos de Peligro (Vaciado) */
        .log-row.peligro { background-color: rgba(239, 68, 68, 0.15); border-left: 4px solid #ef4444; }
        .log-row.peligro:hover { background-color: rgba(239, 68, 68, 0.25); }
        .log-row.peligro .log-time { color: #fca5a5; }
        .log-row.peligro .log-user { color: #ef4444; }
        .log-row.peligro .log-desc { color: #f87171; }
        .log-row.peligro .log-badge { background: #ef4444; color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-admin">
            <h1 style="color: var(--accent); margin:0;">AGORA COMMAND CENTER 🛰️</h1>
            <div class="online-badge">
                <span class="dot"></span>
                USUARIOS ONLINE: <span id="user-online-count" style="margin-left: 5px;">1</span>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab-posts')">Publicaciones</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-comentarios')">Comentarios</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-registros')">Nuevos Usuarios</button>
            <button class="tab-btn" onclick="openTab(event, 'tab-logins')">Inicios Sesión</button>
        </div>

        <div id="tab-posts" class="tab-content active">
            <h3>Actividad de Publicaciones (Nuevas, Ventas, Borrados)</h3>
            <div id="log-posts"></div>
        </div>

        <div id="tab-comentarios" class="tab-content">
            <h3>Actividad de Comentarios</h3>
            <div id="log-comentarios"></div>
        </div>

        <div id="tab-registros" class="tab-content">
            <h3>Registros de Cuentas</h3>
            <div id="log-registros"></div>
        </div>

        <div id="tab-logins" class="tab-content">
            <h3>Historial de Accesos</h3>
            <div id="log-logins"></div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; align-items: center;">
            <button id="btn-vaciar" onclick="vaciarMuroSeguro()" style="background:#ef4444; color:white; border:none; padding:15px 25px; border-radius:8px; cursor:pointer; font-weight:bold; flex: 2;">🚨 VACIAR PÁGINA</button>
            <a href="index.html" onclick="cerrarSesion()" style="background:#475569; color:white; text-decoration:none; padding:15px; border-radius:8px; text-align:center; flex: 1; font-weight: bold;">Cerrar Sesión</a>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function cerrarSesion() {
            localStorage.clear();
        }

        // --- SISTEMA DE VACIADO SEGURO (CON PERMISOS AUTOMÁTICOS) ---
        async function vaciarMuroSeguro() {
            if (!confirm("⚠️ ¿Estás seguro de BORRAR todas las publicaciones? Esta acción no se puede deshacer.")) return;
            
            // Eliminamos el timeout problemático que bloqueaba el prompt en algunos navegadores
            const confirmacion = prompt("Ingresa la palabra CONFIRMAR para proceder:");

            if (confirmacion === "CONFIRMAR") {
                try {
                    const res = await fetch('/limpiar-servidor', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ confirmacion: "CONFIRMAR" })
                    });

                    if (res.ok) {
                        alert("✅ Sistema limpiado exitosamente.");
                        cargarData();
                    } else {
                        alert("❌ Error al procesar la limpieza.");
                    }
                } catch (e) {
                    alert("❌ Error de conexión al intentar vaciar el servidor.");
                }
            } else if (confirmacion !== null) {
                alert("Palabra incorrecta. Operación cancelada.");
            }
        }

        async function cargarData() {
            try {
                const res = await fetch('/admin-full-stats');
                const data = await res.json();
                
                document.getElementById('user-online-count').innerText = data.conectados;
                const logs = data.eventos.slice().reverse();

                renderLogs('log-posts', logs.filter(l => 
                    l.accion.includes("Post") || 
                    l.accion.includes("Estado") || 
                    l.accion.includes("Edición") || 
                    l.accion.includes("Publicación") || 
                    l.accion === "VACIADO TOTAL" // Aseguramos que atrape el vaciado
                ));
                renderLogs('log-comentarios', logs.filter(l => l.accion.includes("Comentario")));
                renderLogs('log-registros', logs.filter(l => l.accion.includes("Registro")));
                renderLogs('log-logins', logs.filter(l => l.accion.includes("Sesión")));
            } catch (e) {
                console.error("Error cargando estadísticas:", e);
            }
        }

        function renderLogs(id, lista) {
            const container = document.getElementById(id);
            if (lista.length === 0) { 
                container.innerHTML = "<p style='color:#64748b; padding:20px;'>Sin actividad registrada.</p>"; 
                return; 
            }
            
            container.innerHTML = lista.map(l => {
                const esPeligro = l.accion === "VACIADO TOTAL";
                const clasePeligro = esPeligro ? "peligro" : "";

                return `
                <div class="log-row ${clasePeligro}">
                    <span class="log-time">${l.fecha.split(',')[1] || l.fecha}</span>
                    <span class="log-user">${l.usuario} <span class="log-badge">${l.rol}</span></span>
                    <span class="log-desc"><strong>${l.accion}:</strong> ${l.detalles}</span>
                </div>
                `;
            }).join('');
        }

        setInterval(cargarData, 3000);
        cargarData();
    </script>
</body>
</html>
