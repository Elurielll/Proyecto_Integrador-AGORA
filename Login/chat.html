<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora Chat</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <div id="chat-container">
        <header>
            <a href="javascript:history.back()" class="perfil-link" title="Volver">
                <div class="avatar">👤</div>
                <div class="user-info">
                    <h3 id="nombre-chat-header">Contacto</h3>
                    <p>En línea</p>
                </div>
            </a>
        </header>

        <div id="chat-window">
            </div>

        <form id="input-form">
            <input id="input-msg" autocomplete="off" placeholder="Escribe un mensaje..." />
            <button id="send-btn" type="submit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // === Leer el nombre de la URL ===
        const urlParams = new URLSearchParams(window.location.search);
        const usuarioDestino = urlParams.get('usuario');
        
        if (usuarioDestino) {
            document.getElementById('nombre-chat-header').textContent = usuarioDestino;
            document.title = "Chat con " + usuarioDestino;
        }

        // === Lógica de WebSockets (Socket.io) ===
        const socket = io();
        const form = document.getElementById('input-form');
        const input = document.getElementById('input-msg');
        const chatWindow = document.getElementById('chat-window');

        form.onsubmit = (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                socket.emit('enviar-mensaje', { texto: input.value });
                input.value = '';
            }
        };

        socket.on('mostrar-mensaje', (data) => {
            const div = document.createElement('div');
            const esMio = data.id === socket.id;
            
            div.classList.add('bubble');
            div.classList.add(esMio ? 'me' : 'others');

            div.innerHTML = `
                ${data.texto}
                <span class="hora">${data.hora}</span>
            `;

            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight; // Hace scroll hacia abajo automáticamente
        });
    </script>
</body>
</html>
