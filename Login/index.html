<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-top">
                <span>EQUIPO 6 - Ingeniería en Software</span>
            </div>
            
            <div class="form" id="form">
                <form class="login" id="login-form">
                    <h2>AGORA</h2>
                    <p>¡Bienvenido! Por favor ingresa tus datos.</p>
                    
                    <div class="input">
                        <label for="email">Correo</label>
                        <input type="email" name="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    
                    <div class="input">
                        <label for="password">Contraseña</label>
                        <input type="password" name="password" id="password" placeholder="Tu contraseña" required>
                    </div>
                    
                    <div class="reminder">
                        <div class="checkbox-container">
                            <input type="checkbox" id="terms" name="remember">
                            <label for="terms">Recordar por 30 días</label>
                        </div>
                        <span class="forgot">¿Olvidaste tu contraseña?</span>
                    </div>
                    
                    <div class="buttons">
                        <button type="submit">Iniciar Sesión</button>
                        <button type="button">
                            <img src="icons/ic-google.svg" alt="Google" class="icon-google">
                            Google
                        </button>
                    </div>
                    
                    <p class="account">¿No tienes una cuenta? <a href="#" id="sign-up">Regístrate</a></p>
                </form>

                <form class="register" id="register-form">
                    <h2>Crea tu cuenta</h2>
                    <p>Usa tu correo para registrarte</p>
                    
                    <div class="input">
                        <label for="name">Tu nombre</label>
                        <input type="text" name="fullname" id="name" placeholder="Ingresa tu nombre" required>
                    </div>
                    
                    <div class="input">
                        <label for="email-reg">Correo</label>
                        <input type="email" name="email_reg" id="email-reg" placeholder="Ingresa tu correo" required>
                    </div>
                    
                    <div class="input">
                        <label for="password-reg">Contraseña</label>
                        <input type="password" name="password_reg" id="password-reg" placeholder="Ingresa tu contraseña" required>
                    </div>
                    
                    <div class="buttons">
                        <button type="submit">Registrar</button>
                        <button type="button">
                            <img src="icons/ic-google.svg" alt="Google" class="icon-google">
                            Google
                        </button>
                    </div>
                    
                    <p class="account">¿Ya tienes una cuenta? <a href="#" id="sign-in">Inicia sesión</a></p>
                </form>
            </div>

            <div class="form-bot">
                <span>© Universidad de Colima 2026</span>
            </div>
        </div>

        <div class="banner" id="banner">
            <div class="circle"></div>
            <div class="circle-2"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
