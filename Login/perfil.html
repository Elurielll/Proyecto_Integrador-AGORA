<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora - Perfil de Usuario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="perfil-body-moderno">

    <a href="publicaciones.html" style="position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 20px; z-index: 10; backdrop-filter: blur(5px);">
        ← Volver al Muro
    </a>

    <div class="perfil-banner-marino"></div>

    <div class="perfil-contenedor-max">
        
        <div class="perfil-tarjeta-horizontal">
    
            <div class="foto-wrapper-editable">
                <img id="avatar-img" src="ruta/a/tu/imagen.png" class="avatar-moderno" alt="Foto de perfil">
                
                <label for="foto-input" id="btn-lapicito" class="edit-pic-overlay" style="display: none;">
                    ✏️
                </label>
                <input type="file" id="foto-input" accept="image/*" style="display: none;">
            </div>

            <div class="perfil-col-info">
                
                <h2 id="vista-nombre" class="nombre-moderno">Uriel</h2>
                <input type="text" id="edit-nombre" class="input-perfil-edit" value="Uriel" style="display: none;">

                <p id="vista-bio" class="bio-moderna">¡Hola! Bienvenido a mi perfil. chavales</p>
                <textarea id="edit-bio" class="input-perfil-edit" style="display: none; resize: none; height: 60px;">¡Hola! Bienvenido a mi perfil. chavales</textarea>

                <div class="ubicacion-container">
                    📍 <span id="vista-ubicacion">Colima, Municipio...</span>
                    
                    <div id="edit-ubicacion" style="display: none;" class="edit-ubi-group">
                        <select id="select-estado" class="input-perfil-edit">
                            <option value="">Selecciona un estado</option>
                            <option value="Aguascalientes">Aguascalientes</option>
                            <option value="Baja California">Baja California</option>
                            <option value="Baja California Sur">Baja California Sur</option>
                            <option value="Campeche">Campeche</option>
                            <option value="Chiapas">Chiapas</option>
                            <option value="Chihuahua">Chihuahua</option>
                            <option value="Ciudad de México">Ciudad de México</option>
                            <option value="Coahuila">Coahuila</option>
                            <option value="Colima">Colima</option>
                            <option value="Durango">Durango</option>
                            <option value="Estado de México">Estado de México</option>
                            <option value="Guanajuato">Guanajuato</option>
                            <option value="Guerrero">Guerrero</option>
                            <option value="Hidalgo">Hidalgo</option>
                            <option value="Jalisco">Jalisco</option>
                            <option value="Michoacán">Michoacán</option>
                            <option value="Morelos">Morelos</option>
                            <option value="Nayarit">Nayarit</option>
                            <option value="Nuevo León">Nuevo León</option>
                            <option value="Oaxaca">Oaxaca</option>
                            <option value="Puebla">Puebla</option>
                            <option value="Querétaro">Querétaro</option>
                            <option value="Quintana Roo">Quintana Roo</option>
                            <option value="San Luis Potosí">San Luis Potosí</option>
                            <option value="Sinaloa">Sinaloa</option>
                            <option value="Sonora">Sonora</option>
                            <option value="Tabasco">Tabasco</option>
                            <option value="Tamaulipas">Tamaulipas</option>
                            <option value="Tlaxcala">Tlaxcala</option>
                            <option value="Veracruz">Veracruz</option>
                            <option value="Yucatán">Yucatán</option>
                            <option value="Zacatecas">Zacatecas</option>
                        </select>

                        <select id="select-municipio" class="input-perfil-edit" disabled>
                            <option value="">Selecciona un municipio</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="perfil-acciones">
                <button id="btn-editar-perfil" class="btn-detalles">✏️ Editar Perfil</button>
                <button id="btn-guardar-cambios" class="btn-contactar-oscuro" style="display: none;">💾 Guardar Cambios</button>
                <button id="btn-chatear" class="btn-contactar-oscuro" style="display: none;">💬 Chatear</button>
            </div>

        </div>

        <div class="perfil-seccion-tabs">
            <span class="tab-pildora">Publicaciones</span>
        </div>

        <div class="grid-productos-moderno" id="contenedor-publicaciones-perfil">
            <p style="text-align: center; color: gray; grid-column: 1 / -1; padding: 2rem; width: 100%;">Cargando publicaciones...</p>
        </div>
    </div>

    <div id="modal-publicacion-perfil" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 9999; justify-content: center; align-items: center;">
        <div style="display: flex; width: 85%; height: 85%; max-width: 1200px; background-color: #fff; border-radius: 8px; overflow: hidden; position: relative;">
            
            <button onclick="cerrarModalPerfil()" style="position: absolute; top: 15px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 1.2rem; font-weight: bold; cursor: pointer; z-index: 10000; display: flex; align-items: center; justify-content: center;">×</button>

            <div style="flex: 1.4; background-color: #1e293b; display: flex; align-items: center; justify-content: center; position: relative; height: 100%;">
                <img id="perfil-modal-img" src="" alt="Imagen de la publicación" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                
                <button id="btn-prev-perfil" style="position: absolute; left: 15px; background: rgba(0,0,0,0.4); border: none; color: white; font-size: 2rem; padding: 10px; cursor: pointer; border-radius: 4px; display: none;">‹</button>
                <button id="btn-next-perfil" style="position: absolute; right: 15px; background: rgba(0,0,0,0.4); border: none; color: white; font-size: 2rem; padding: 10px; cursor: pointer; border-radius: 4px; display: none;">›</button>
            </div>

            <div id="perfil-sidebar-comments" style="flex: 1; display: flex; flex-direction: column; height: 100%; background-color: #ffffff; border-left: 1px solid #e2e8f0; overflow-y: auto;">
                </div>

        </div>
    </div>

    <script src="perfil.js"></script>
</body>
</html>
